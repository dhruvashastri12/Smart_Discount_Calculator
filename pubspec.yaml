name: smart_discount_calculator
description: "Smart Discount Calculator Project."
publish_to: 'none'

# Rule:
# 1.0.2 = versionName (visible to users on the Play Store).
# +3 = versionCode (internal integer Google Play uses to track upgrades—must be higher than the last upload).

version: 1.0.2+3

environment:
  sdk: ^3.11.1

dependencies:
  camera: ^0.12.0+1
  firebase_analytics: ^12.4.5
  firebase_core: ^4.12.1
  firebase_crashlytics: ^5.2.6
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  json_serializable: ^6.13.1
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.5.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/
    - assets/fonts/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/DMSans-Black.ttf
          weight: 900
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-ExtraBold.ttf
          weight: 800
